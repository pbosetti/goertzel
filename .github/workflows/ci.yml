name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-check:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            cmake_extra_args: ""
          - name: linux-arm64
            os: ubuntu-24.04-arm
            cmake_extra_args: ""
          - name: macos-intel
            os: macos-13
            cmake_extra_args: ""
          - name: macos-arm64
            os: macos-14
            cmake_extra_args: ""
          - name: windows-x86
            os: windows-2022
            cmake_extra_args: >-
              -G "Visual Studio 17 2022" -A Win32

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::Rcpp

      - name: Configure CMake
        shell: bash
        run: >
          cmake -S . -B build
          -DGOERTZEL_BUILD_PYTHON=OFF
          ${{ matrix.cmake_extra_args }}

      - name: Build CMake targets
        shell: bash
        run: cmake --build build --config Release

      - name: Run CMake tests
        shell: bash
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Check R package
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: false
